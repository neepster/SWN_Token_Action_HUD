name: Release

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: |
          zip -r token-action-hud-swnr.zip \
            module.json \
            scripts/ \
            styles/ \
            lang/ \
            README.md \
            LICENSE

      - name: Upload release assets
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            module.json \
            token-action-hud-swnr.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
